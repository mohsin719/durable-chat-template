services:
  postgres:
    image: postgres:16-alpine
    container_name: vsms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vsms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_master_change_me}
    volumes:
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - vsms-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: vsms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "4000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_master_change_me}@postgres:5432/vsms?schema=public&connection_limit=50&pool_timeout=5
      JWT_SECRET: ${JWT_SECRET:-replace-this-with-a-long-random-secret-string-min-32}
      JWT_EXPIRES_SEC: "900"
      JWT_REFRESH_EXPIRES_IN: "7d"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      TELNYX_API_KEY: ${TELNYX_API_KEY:-}
      MOCK_TELNYX: ${MOCK_TELNYX:-true}
      NUMBER_PRICE_CENTS: "100"
      NUMBER_LEASE_TTL_MINUTES: "30"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "100"
      ENABLE_QUERY_LOGGING: "true"
      SLOW_QUERY_THRESHOLD_MS: "1000"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - vsms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
        NEXT_PUBLIC_ADMIN_WHATSAPP_E164: ${NEXT_PUBLIC_ADMIN_WHATSAPP_E164:-923474094312}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: vsms-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - vsms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: vsms-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - vsms-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vsms-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_change_me}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
      PGADMIN_CONFIG_COOKIE_SAMESITE: 'Lax'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - vsms-network
    profiles:
      - dev

networks:
  vsms-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  pgbackups:
    driver: local
  pgadmin_data:
    driver: local
